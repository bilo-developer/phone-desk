<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

            background: radial-gradient(circle at 20% 30%, rgba(173, 198, 255, 0.15) 0%, transparent 70%);

        }
        .bg-orb-2 {
            background: radial-gradient(circle at 80% 70%, rgba(232, 179, 255, 0.15) 0%, transparent 70%);
            filter: blur(80px);
        }
        
        .touchpad-area {
            touch-action: none; /* Prevent scrolling on touchpad */
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface min-h-screen overflow-hidden selection:bg-primary-container selection:text-on-primary-container font-body-md antialiased flex flex-col relative">
<!-- Atmospheric Orbs -->
<div class="fixed inset-0 pointer-events-none z-0">
<div class="absolute inset-0 bg-orb-1 mix-blend-screen"></div>
<div class="absolute inset-0 bg-orb-2 mix-blend-screen"></div>
</div>
<!-- TopAppBar -->
<header class="bg-glass-surface dark:bg-glass-surface fixed top-0 w-full z-50 backdrop-blur-[40px] border-b border-white/10 flat no shadows flex justify-between items-center px-container-padding h-touch-target">
<button class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="settings_remote">settings_remote</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary dark:text-primary-fixed-dim">Remote Control</h1>
<button class="w-touch-target h-touch-target flex items-center justify-center text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</header>
<!-- Main Content Area - Touchpad -->
<main class="flex-grow flex flex-col pt-[calc(44px+20px)] pb-[calc(100px+24px)] px-container-padding max-w-[448px] w-full mx-auto relative z-10 h-screen">
<!-- Touchpad Canvas -->
<div class="flex-grow rounded-3xl bg-glass-surface backdrop-blur-[40px] border border-white/10 relative overflow-hidden flex flex-col items-center justify-center touchpad-area cursor-crosshair group shadow-lg shadow-black/20" id="touchpad">
<!-- Center Indicator -->
<div class="flex flex-col items-center justify-center opacity-40 group-hover:opacity-20 transition-opacity duration-500 pointer-events-none gap-stack-gap">
<span class="material-symbols-outlined text-6xl text-primary" data-icon="touch_app">touch_app</span>
<p class="font-body-md text-body-md text-on-surface-variant text-center max-w-[200px]">Fareyi hareket ettirmek için sürükleyin</p>
</div>
<!-- Touch Ripple Effect Container (JS injected) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden rounded-3xl" id="ripple-container"></div>
</div>
<!-- Mouse Buttons -->
<div class="grid grid-cols-2 gap-grid-gutter mt-stack-gap mb-stack-gap h-24">
<!-- Left Click -->
<button class="rounded-xl bg-glass-surface backdrop-blur-[40px] border border-white/10 flex items-center justify-center active:bg-white/5 active:scale-95 transition-all duration-200 group relative overflow-hidden" id="btn-left-click">
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary/50 to-transparent opacity-0 group-active:opacity-100 transition-opacity"></div>
<span class="font-label-lg text-label-lg text-on-surface-variant group-active:text-primary transition-colors">Sol Tık</span>
</button>
<!-- Right Click -->
<button class="rounded-xl bg-glass-surface backdrop-blur-[40px] border border-white/10 flex items-center justify-center active:bg-white/5 active:scale-95 transition-all duration-200 group relative overflow-hidden" id="btn-right-click">
<div class="absolute top-0 right-0 w-full h-1 bg-gradient-to-l from-secondary/50 to-transparent opacity-0 group-active:opacity-100 transition-opacity"></div>
<span class="font-label-lg text-label-lg text-on-surface-variant group-active:text-secondary transition-colors">Sağ Tık</span>
</button>
</div>
</main>
<!-- BottomNavBar -->
<nav class="bg-glass-surface dark:bg-glass-surface fixed bottom-6 left-1/2 -translate-x-1/2 w-[calc(100%-40px)] max-w-[448px] rounded-full backdrop-blur-[40px] z-50 border border-white/10 shadow-lg shadow-primary/20 flex justify-around items-center py-2 px-4 md:hidden">
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary-container text-on-primary-container dark:text-on-primary-container rounded-full w-11 h-11 Active: scale-90 transition-transform duration-150">
<span class="material-symbols-outlined" data-icon="trackpad" style="font-variation-settings: 'FILL' 1;">backpack</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-11 h-11 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined" data-icon="monitor">monitor</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-11 h-11 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined" data-icon="folder_open">folder_open</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-11 h-11 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined" data-icon="keyboard_command_key">keyboard_command_key</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant dark:text-on-surface-variant w-11 h-11 hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined" data-icon="settings_suggest">settings_suggest</span>
</button>
</nav>
<!-- Interactive Logic -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const touchpad = document.getElementById('touchpad');
            const rippleContainer = document.getElementById('ripple-container');
            const btnLeft = document.getElementById('btn-left-click');
            const btnRight = document.getElementById('btn-right-click');

            // Haptic feedback helper
            const triggerHaptic = (pattern = 10) => {
                if (navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            };

            // Touchpad visual feedback
            const createRipple = (e) => {
                let x, y;
                if (e.type.includes('touch')) {
                    const rect = touchpad.getBoundingClientRect();
                    x = e.touches[0].clientX - rect.left;
                    y = e.touches[0].clientY - rect.top;
                } else {
                    x = e.offsetX;
                    y = e.offsetY;
                }

                const ripple = document.createElement('div');
                ripple.className = 'absolute rounded-full bg-primary/20 pointer-events-none transform -translate-x-1/2 -translate-y-1/2 transition-all duration-300 ease-out';
                ripple.style.left = `${x}px`;
                ripple.style.top = `${y}px`;
                ripple.style.width = '20px';
                ripple.style.height = '20px';
                
                rippleContainer.appendChild(ripple);

                requestAnimationFrame(() => {
                    ripple.style.width = '80px';
                    ripple.style.height = '80px';
                    ripple.style.opacity = '0';
                });

                setTimeout(() => {
                    ripple.remove();
                }, 300);
            };

            touchpad.addEventListener('touchstart', (e) => {
                e.preventDefault(); // prevent scroll
                createRipple(e);
                triggerHaptic(5);
            });

            touchpad.addEventListener('touchmove', (e) => {
                e.preventDefault(); // prevent scroll
                // In a real app, send coordinates here
            });

            touchpad.addEventListener('mousedown', (e) => {
                createRipple(e);
            });

            // Button Feedback
            btnLeft.addEventListener('pointerdown', () => triggerHaptic([10]));
            btnRight.addEventListener('pointerdown', () => triggerHaptic([15]));
        });
    </script>
</body></html>
