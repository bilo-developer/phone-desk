<style>
        body {
            background-color: #000000; /* Base Level 0 */
            color: theme('colors.on-surface');
        }
        .deck-container {
            background-color: #0A0A0B; /* Surface Level 1 */
            border: 1px solid #1F1F23;
        }
        .control-tile {
            background-color: #161618; /* Tile Level 2 */
            background-image: linear-gradient(to bottom, rgba(255, 255, 255, 0.05) 0%, rgba(255, 255, 255, 0) 100%);
            border: 1px solid #1F1F23;
            transition: all 150ms ease-in-out;
        }
        .control-tile:active {
            transform: translateY(1px);
            filter: brightness(0.9);
        }
        .control-tile.active-primary {
            border: 2px solid theme('colors.primary');
            box-shadow: 0px 0px 12px rgba(219, 252, 255, 0.4);
            background-image: linear-gradient(to bottom, rgba(219, 252, 255, 0.1) 0%, rgba(219, 252, 255, 0) 100%);
        }
        .control-tile.active-tertiary {
            border: 2px solid theme('colors.tertiary');
            box-shadow: 0px 0px 12px rgba(219, 255, 215, 0.4);
            background-image: linear-gradient(to bottom, rgba(219, 255, 215, 0.1) 0%, rgba(219, 255, 215, 0) 100%);
        }
        .control-tile.active-error {
            border: 2px solid theme('colors.error');
            box-shadow: 0px 0px 12px rgba(255, 180, 171, 0.4);
            background-image: linear-gradient(to bottom, rgba(255, 180, 171, 0.1) 0%, rgba(255, 180, 171, 0) 100%);
        }
        
        .status-pulse {
            animation: pulse-red 2s infinite;
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 180, 171, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(255, 180, 171, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(255, 180, 171, 0); }
        }

<div class="flex gap-4">

<!-- Scenes -->

<!-- Audio -->

<span class="font-label-sm text-label-sm">Stats</span>

<script>
        // Simple micro-interaction for momentary buttons
        document.querySelectorAll('.control-tile').forEach(button => {
            if(!button.classList.contains('active-primary') && !button.classList.contains('active-tertiary')) {
                button.addEventListener('mousedown', () => {
                    button.classList.add('border-primary');
                    setTimeout(() => {
                        button.classList.remove('border-primary');
                    }, 150);
                });
                button.addEventListener('touchstart', () => {
                    button.classList.add('border-primary');
                    setTimeout(() => {
                        button.classList.remove('border-primary');
                    }, 150);
                });
            }
        });
    </script>
