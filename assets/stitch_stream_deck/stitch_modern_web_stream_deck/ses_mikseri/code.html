<script>
        // Simple script to animate meters slightly to simulate live audio
        document.addEventListener('DOMContentLoaded', () => {
            const meters = document.querySelectorAll('.meter-bar');
            
            setInterval(() => {
                meters.forEach(meter => {
                    // Skip if parent channel is muted (opacity check as proxy)
                    const channel = meter.closest('.flex-col.items-center.w-24');
                    if(channel && channel.classList.contains('opacity-60')) return;

                    // Get current base height from inline style or compute
                    const currentHeight = meter.style.height ? parseFloat(meter.style.height) : (meter.offsetHeight / meter.parentElement.offsetHeight * 100);
                    
                    // Add some random jitter
                    let jitter = (Math.random() - 0.5) * 15;
                    let newHeight = currentHeight + jitter;
                    
                    // Clamp
                    if(newHeight > 95) newHeight = 90;
                    if(newHeight < 10) newHeight = 15;

                    meter.style.height = `${newHeight}%`;
                });
            }, 100); // 100ms update rate for snappiness
        });
    </script>
